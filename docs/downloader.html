<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>IP Inspector Z Downloads</title>
    </head>
    <body>
        <h1>Available Downloads</h1>
        <ul id="downloads"></ul>

        <script>
            const owner = 'RlxChap2';
            const repo = 'IPInspectorZ';

            fetch(`https://api.github.com/repos/${owner}/${repo}/releases/latest`)
                .then((response) => response.json())
                .then((data) => {
                    const list = document.getElementById('downloads');
                    data.assets.forEach((asset) => {
                        const li = document.createElement('li');
                        const link = document.createElement('a');
                        link.href = asset.browser_download_url;
                        link.textContent = `${asset.name} (${(asset.size / 1024 / 1024).toFixed(2)} MB)`;
                        link.target = '_blank';
                        li.appendChild(link);
                        list.appendChild(li);
                    });
                })
                .catch((err) => {
                    document.getElementById('downloads').textContent = 'Failed to load releases.';
                });
        </script>
    </body>
</html>
