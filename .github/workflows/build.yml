name: BUILD & RELEASE CI

on:
    push:
        branches:
            - main
            - master
        tags:
            - 'v*'
    pull_request:
        branches:
            - main
            - master
    release:
        types: [released]

permissions:
    contents: write

env:
    NODE_VERSION: '24'
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    build-windows:
        name: Build (Windows)
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'

            - uses: dtolnay/rust-toolchain@stable

            - run: npm ci
            - run: npm run icon
            - run: npm run build:app

            - name: Upload Windows artifacts
              if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
              uses: actions/upload-artifact@v4
              with:
                  name: ip-inspector-z-windows
                  path: |
                      src-tauri/target/release/bundle/msi/*.msi
                      src-tauri/target/release/bundle/nsis/*.exe
                      src-tauri/target/release/ip-inspector-z.exe
                  if-no-files-found: warn

    build-macos:
        name: Build (macOS)
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'

            - uses: dtolnay/rust-toolchain@stable

            - run: npm ci
            - run: npm run icon
            - run: npm run build:app

            - name: Upload macOS artifacts
              if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
              uses: actions/upload-artifact@v4
              with:
                  name: ip-inspector-z-macos
                  path: |
                      src-tauri/target/release/bundle/dmg/*.dmg
                      src-tauri/target/release/bundle/macos/*.app
                  if-no-files-found: warn

    build-linux:
        name: Build (Linux)
        runs-on: ubuntu-22.04
        steps:
            - uses: actions/checkout@v4

            - name: Install Linux dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'

            - uses: dtolnay/rust-toolchain@stable

            - run: npm ci
            - run: npm run icon
            - run: npm run build:app

            - name: Upload Linux artifacts
              if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
              uses: actions/upload-artifact@v4
              with:
                  name: ip-inspector-z-linux
                  path: |
                      src-tauri/target/release/bundle/appimage/*.AppImage
                      src-tauri/target/release/bundle/deb/*.deb
                  if-no-files-found: warn

    release:
        name: Create GitHub Release
        needs: [build-windows, build-macos, build-linux]
        runs-on: ubuntu-latest
        if: always() && startsWith(github.ref, 'refs/tags/') && (needs.build-windows.result == 'success' || needs.build-macos.result == 'success' || needs.build-linux.result == 'success')
        steps:
            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: release-artifacts

            - name: Create Release
              uses: softprops/action-gh-release@v2
              with:
                  files: release-artifacts/**/*
                  generate_release_notes: true
                  body: |
                      **IPInspectorZ** — Network and device diagnostics.

                      | Platform | Artifacts |
                      |----------|-----------|
                      | Windows  | MSI installer, NSIS installer, portable .exe |
                      | macOS    | .dmg, .app |
                      | Linux    | AppImage, .deb |

                      See [README](https://github.com/${{ github.repository }}#readme) for details.
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    publish-docs:
        name: Publish Installer to Docs
        needs: [build-windows]
        runs-on: ubuntu-latest
        if: needs.build-windows.result == 'success'
        steps:
            - name: Checkout main
              uses: actions/checkout@v4
              with:
                  ref: main

            - name: Download Windows artifacts
              uses: actions/download-artifact@v4
              with:
                  name: ip-inspector-z-windows
                  path: temp-windows-artifacts

            - name: Copy and rename installer
              run: |
                  mkdir -p docs
                  find temp-windows-artifacts -name "*setup.exe" -type f -exec cp {} docs/IPInspectorZ-setup.exe \;

            - name: Commit and push
              run: |
                  git config --global user.name "github-actions[bot]"
                  git config --global user.email "github-actions[bot]@users.noreply.github.com"
                  git add docs/IPInspectorZ-setup.exe
                  git commit -m "docs: deploy IPInspectorZ-setup.exe [skip ci]" || echo "No changes to commit"
                  git push origin main
