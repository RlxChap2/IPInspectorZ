# BUILD & RELEASE CI — Windows, macOS, Linux, iOS, Android
# For iOS/Android: run `npm run tauri ios init` and `npm run tauri android init` locally once, then commit the generated folders.

name: BUILD & RELEASE CI

on:
    push:
        branches:
            - main
            - master
    pull_request:
        branches:
            - main
            - master
    release:
        types: [released]

env:
    NODE_VERSION: '20'

jobs:
    build-windows:
        name: Build (Windows)
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'

            - uses: dtolnay/rust-toolchain@stable

            - run: npm ci
            - run: npm run icon
            - run: npm run build:app

            - name: Upload Windows artifacts
              if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
              uses: actions/upload-artifact@v4
              with:
                  name: ip-inspector-z-windows
                  path: |
                      src-tauri/target/release/bundle/nsis/*.exe
                      src-tauri/target/release/ip-inspector-z.exe
                  if-no-files-found: warn

    build-macos:
        name: Build (macOS)
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'

            - uses: dtolnay/rust-toolchain@stable

            - run: npm ci
            - run: npm run icon
            - run: npm run build:app

            - name: Upload macOS artifacts
              if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
              uses: actions/upload-artifact@v4
              with:
                  name: ip-inspector-z-macos
                  path: |
                      src-tauri/target/release/bundle/dmg/*.dmg
                      src-tauri/target/release/bundle/macos/*.app
                  if-no-files-found: warn

    build-linux:
        name: Build (Linux)
        runs-on: ubuntu-22.04
        steps:
            - uses: actions/checkout@v4

            - name: Install Linux dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'

            - uses: dtolnay/rust-toolchain@stable

            - run: npm ci
            - run: npm run icon
            - run: npm run build:app

            - name: Upload Linux artifacts
              if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
              uses: actions/upload-artifact@v4
              with:
                  name: ip-inspector-z-linux
                  path: |
                      src-tauri/target/release/bundle/appimage/*.AppImage
                      src-tauri/target/release/bundle/deb/*.deb
                  if-no-files-found: warn

    build-ios:
        name: Build (iOS)
        runs-on: macos-latest
        continue-on-error: true # Fails until you run: npm run tauri ios init (and commit)
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'

            - uses: dtolnay/rust-toolchain@stable
              with:
                  targets: aarch64-apple-ios

            - run: npm ci
            - run: npm run icon
            - run: npm run build
            - run: npx tauri ios build --ci
              env:
                  CI: true

            - name: Upload iOS artifacts
              if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
              uses: actions/upload-artifact@v4
              with:
                  name: ip-inspector-z-ios
                  path: |
                      src-tauri/target/aarch64-apple-ios/release/bundle/ios/*.ipa
                      src-tauri/gen/apple/build/Release-iphoneos/*.app
                  if-no-files-found: warn

    build-android:
        name: Build (Android)
        runs-on: ubuntu-22.04
        continue-on-error: true # Fails until you run: npm run tauri android init (and commit)
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-java@v4
              with:
                  distribution: 'temurin'
                  java-version: '17'

            - name: Setup Android SDK and NDK
              run: |
                  ANDROID_HOME="$RUNNER_WORKSPACE/android-sdk"
                  echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
                  echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
                  mkdir -p "$ANDROID_HOME" && cd "$ANDROID_HOME"
                  curl -sL "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -o ct.zip
                  unzip -q ct.zip
                  mv cmdline-tools cmt-tmp && mkdir -p cmdline-tools && mv cmt-tmp cmdline-tools/latest
                  yes | ./cmdline-tools/latest/bin/sdkmanager --sdk_root="$ANDROID_HOME" "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;26.1.10909125"
                  echo "NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV
                  echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'

            - uses: dtolnay/rust-toolchain@stable

            - run: npm ci
            - run: npm run icon
            - run: npm run build
            - run: npx tauri android build --apk --ci
              env:
                  CI: true

            - name: Upload Android artifacts
              if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
              uses: actions/upload-artifact@v4
              with:
                  name: ip-inspector-z-android
                  path: |
                      src-tauri/gen/android/app/build/outputs/apk/**/*.apk
                      src-tauri/gen/android/app/build/outputs/bundle/**/*.aab
                  if-no-files-found: warn

    release:
        name: Create GitHub Release
        needs: [build-windows, build-macos, build-linux, build-ios, build-android]
        runs-on: ubuntu-latest
        # Create release on tag; run even if iOS/Android failed (e.g. not inited yet)
        if: always() && startsWith(github.ref, 'refs/tags/') && (needs.build-windows.result == 'success' || needs.build-macos.result == 'success' || needs.build-linux.result == 'success')
        steps:
            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: release-artifacts

            - name: Create Release
              uses: softprops/action-gh-release@v2
              with:
                  files: release-artifacts/**/*
                  generate_release_notes: true
                  body: |
                      **IP Inspector Z** — Network and device diagnostics.

                      | Platform | Artifacts |
                      |----------|-----------|
                      | Windows  | NSIS installer, portable .exe |
                      | macOS    | .dmg, .app |
                      | Linux    | AppImage, .deb |
                      | iOS      | .ipa, .app |
                      | Android  | .apk, .aab |

                      See [README](https://github.com/${{ github.repository }}#readme) for details.
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
